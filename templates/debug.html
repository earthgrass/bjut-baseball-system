<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>调试页面</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <h2>调试信息</h2>
        <button onclick="testAddPlayer()" class="btn btn-primary mb-3">测试添加球员</button>
        <button onclick="getAllPlayers()" class="btn btn-secondary mb-3">获取所有球员</button>
        <div id="result" class="mt-3"></div>
    </div>
    
    <script>
    async function testAddPlayer() {
        const testData = {
            name: "测试球员",
            jersey_number: "99",
            position: "外野手",
            is_pitcher: false
        };
        
        try {
            const response = await fetch('/api/players', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(testData)
            });
            
            const result = await response.json();
            document.getElementById('result').innerHTML = `
                <div class="alert alert-${response.ok ? 'success' : 'danger'}">
                    <h5>测试结果：${response.ok ? '成功' : '失败'}</h5>
                    <pre>${JSON.stringify(result, null, 2)}</pre>
                </div>
            `;
        } catch (error) {
            document.getElementById('result').innerHTML = `
                <div class="alert alert-danger">
                    <h5>请求失败</h5>
                    <pre>${error}</pre>
                </div>
            `;
        }
    }
    
    async function getAllPlayers() {
        try {
            const response = await fetch('/api/players');
            const result = await response.json();
            document.getElementById('result').innerHTML = `
                <div class="alert alert-info">
                    <h5>共有 ${result.length} 名球员</h5>
                    <pre>${JSON.stringify(result, null, 2)}</pre>
                </div>
            `;
        } catch (error) {
            document.getElementById('result').innerHTML = `
                <div class="alert alert-danger">
                    <h5>请求失败</h5>
                    <pre>${error}</pre>
                </div>
            `;
        }
    }
    </script>
</body>
</html>
